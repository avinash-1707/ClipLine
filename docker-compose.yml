services:
  postgres:
    image: postgres:18
    container_name: clipline-postgres
    environment:
      POSTGRES_USER: clipline
      POSTGRES_PASSWORD: clipline
      POSTGRES_DB: clipline
    ports:
      - "5432:5432"
    volumes:
      # postgres:18 images expect the mount one level above the data dir
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipline -d clipline"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: node:22-slim
    container_name: clipline-migrate
    working_dir: /repo/apps/api
    environment:
      DATABASE_URL: postgres://clipline:clipline@postgres:5432/clipline
    volumes:
      - .:/repo
    depends_on:
      postgres:
        condition: service_healthy
    # one-shot: applies pending drizzle migrations, then exits
    restart: "no"
    command: >
      sh -c "corepack enable && pnpm db:migrate"

  redis:
    image: redis:8
    container_name: clipline-redis
    ports:
      # host 6380 -> container 6379 (6379 on the host is taken by a system redis)
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
